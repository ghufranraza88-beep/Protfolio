<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | ModernBrand</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">MODERN<span>BRAND</span></div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main class="container page-padding">
        <h1>Contact Us</h1>
        <div class="contact-wrapper">
            <div class="contact-form-container">
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Your Name">
                        <small class="error-msg"></small>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Your Email">
                        <small class="error-msg"></small>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="5" placeholder="How can we help?"></textarea>
                        <small class="error-msg"></small>
                    </div>
                    <button type="submit" class="btn">Send Message</button>
                    <div id="formSuccess" class="success-hide">Message sent successfully!</div>
                </form>
            </div>

            <div class="contact-info">
                <h3>Get In Touch</h3>
                <p><strong>Email:</strong> hello@modernbrand.com</p>
                <p><strong>Phone:</strong> +1 (555) 123-4567</p>
                <div class="map-placeholder">
                    <span>Map Placeholder</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content container">
            <p>&copy; 2026 ModernBrand. All rights reserved.</p>
            <div class="socials">
                <a href="#">FB</a>
                <a href="#">TW</a>
                <a href="#">IG</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
